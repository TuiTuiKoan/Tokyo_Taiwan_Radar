name: Secret Rotation Reminder

on:
  # Every 90 days: Jan 25, Apr 25, Jul 25, Oct 25 at 10:00 JST (01:00 UTC)
  schedule:
    - cron: "0 1 25 1,4,7,10 *"
  # Allow manual trigger to test
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Send LINE reminder
        working-directory: scraper
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python secret_reminder.py
