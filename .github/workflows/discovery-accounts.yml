name: Daily Account Discovery

on:
  schedule:
    # Slot 0 — Mon 11:00 JST (02:00 UTC): note.com community/exchange events
    - cron: "0 2 * * 1"
    # Slot 1 — Tue 11:00 JST (02:00 UTC): note.com culture & arts
    - cron: "0 2 * * 2"
    # Slot 2 — Wed 11:00 JST (02:00 UTC): note.com food & lifestyle
    - cron: "0 2 * * 3"
    # Slot 3 — Thu 11:00 JST (02:00 UTC): Peatix organizer groups
    - cron: "0 2 * * 4"
  workflow_dispatch:
    inputs:
      slot:
        description: "Discovery slot to run (0=note community, 1=note culture, 2=note food, 3=peatix)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Resolve discovery slot
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "DISCOVERY_SLOT=${{ github.event.inputs.slot }}" >> $GITHUB_ENV
          else
            # Derive from weekday: Mon(1)=0, Tue(2)=1, Wed(3)=2, Thu(4)=3
            DAY=$(date -u +%u)
            SLOT=$(( (DAY - 1) % 4 ))
            echo "DISCOVERY_SLOT=$SLOT" >> $GITHUB_ENV
          fi

      - name: Run account discovery
        working-directory: scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DISCOVERY_SLOT: ${{ env.DISCOVERY_SLOT }}
        run: python discovery_accounts.py
