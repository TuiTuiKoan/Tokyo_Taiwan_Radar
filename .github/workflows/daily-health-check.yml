name: Daily Health Check

on:
  # Run 90 minutes after the scraper (00:00 UTC), giving it time to finish
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      always_notify:
        description: "Send LINE even when healthy (for testing)"
        required: false
        default: "false"

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run health check
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.always_notify }}" = "true" ]; then
            ARGS="--always"
          fi
          python health_check.py $ARGS
